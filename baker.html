<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>Pizza Service</title>
    <link rel="icon" type="image/png" href="images/logo.png">
</head>

<body>
<header>
    <h1>Bäcker</h1>
</header>
<main>
    <h2>Zu backende Pizzen</h2>

    <form method="post">
        <table>
            <tr>
                <th></th>
                <th>bestellt</th>
                <th>im Ofen</th>
                <th>fertig</th>
            </tr>
            <tr>
                <td>Salami</td>
                <td><input type="radio" name="1.Salami" value="bestellt" checked></td>
                <td><input type="radio" name="1.Salami" value="im Ofen"></td>
                <td><input type="radio" name="1.Salami" value="fertig"></td>
            </tr>
            <tr>
                <td>Schinken</td>
                <td><input type="radio" name="2.Schinken" value="bestellt"></td>
                <td><input type="radio" name="2.Schinken" value="im Ofen" checked></td>
                <td><input type="radio" name="2.Schinken" value="fertig"></td>
            </tr>
            <tr>
                <td>Vegetarier</td>
                <td><input type="radio" name="3.Vegetarier" value="bestellt"></td>
                <td><input type="radio" name="3.Vegetarier" value="im Ofen"></td>
                <td><input type="radio" name="3.Vegetarier" value="fertig" checked></td>
            </tr>
        </table>

        <br>

        <button type="submit">Speichern</button>
    </form>
</main>

<footer>
    <p>&copy; Pizza Service 2026</p>
</footer>
</body>

</html>
